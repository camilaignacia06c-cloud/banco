<!doctype html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar socio</title>
</head>
<body>
    <h1>Agregar socio</h1>

    <form method="post">


        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" maxlength="100" required>
        <br><br>

        <label for="edad">Edad:</label>
        <input type="number" id="edad" name="edad" min="1" required>
        <br><br>

        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" name="peso" step="0.01" min="0.01" required>
        <br><br>

        <label for="estatura">Estatura (m):</label>
        <input type="number" id="estatura" name="estatura" step="0.01" min="0.01" required>
        <br><br>

        <button type="submit">Guardar socio</button>
    </form>

    <p><a href="{{ url_for('socios') }}">Ver tabla de socios</a></p>
</body>
</html>
